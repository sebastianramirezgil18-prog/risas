<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Club | Jugadores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --oro: #d4af37;
            --azul-oscuro: #0a0e1a;
            --blanco: #ffffff;
            --gris-oscuro: #1a1a1a;
            --gris-tarjeta: rgba(26, 26, 26, 0.9);
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('logo.jpg') center/cover no-repeat fixed;
            color: var(--blanco);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CONTENEDOR AJUSTADO PARA LOS DOS BOTONES */
        .nav-superior {
            padding: 30px 5% 10px 5%;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-dorado {
            display: inline-block;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: bold;
            color: black;
            text-decoration: none;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f6d365 0%, var(--oro) 100%);
            border: 2px solid var(--oro);
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
            transition: 0.3s ease;
        }

        .btn-dorado:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.5);
        }

        .container {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 5% 60px 5%;
            width: 90%;
        }

        h2 {
            color: var(--oro);
            text-align: center;
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        /* DISEÑO DEL FORMULARIO */
        .formulario-box {
            background: var(--gris-tarjeta);
            border: 2px solid #333;
            border-top: 5px solid var(--oro);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: var(--oro);
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--oro);
            outline: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .btn-submit {
            background: linear-gradient(135deg, #f6d365 0%, var(--oro) 100%);
            color: black;
            border: none;
            padding: 14px 30px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: 0.3s;
        }

        .btn-submit:hover {
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* TABLA DE DATOS */
        .tabla-box {
            background: var(--gris-tarjeta);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--oro);
            border-bottom: 2px solid var(--oro);
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333;
            font-size: 0.95rem;
        }

        tr:hover td {
            background: rgba(212, 175, 55, 0.05);
        }

        .btn-accion {
            border: none;
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
            transition: 0.3s;
        }

        .btn-editar { background: #28a745; color: white; }
        .btn-editar:hover { background: #218838; transform: scale(1.05); }

        .btn-borrar { background: #dc3545; color: white; }
        .btn-borrar:hover { background: #bd2130; transform: scale(1.05); }

        /* FOOTER */
        footer { 
            padding: 60px 20px; 
            text-align: center; 
            background: black; 
            margin-top: auto;
        }
        .social { margin-bottom: 25px; }
        .social a { color: var(--oro); font-size: 2.2rem; margin: 0 20px; text-decoration: none; transition: 0.3s; }
        .social a:hover { color: white; }
    </style>
</head>
<body>

    <div class="nav-superior">
        <a href="risas.html" class="btn-dorado">← Volver al Inicio</a>
        <a href="servicios.html" class="btn-dorado">A qué me dedico →</a>
    </div>

    <div class="container">
        <h2>Registro e Inscripción </h2>

        <div class="formulario-box">
            <form id="jugadorForm">
                <input type="hidden" id="indexJugador">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" required min="5" max="25" placeholder="Ej: 14">
                    </div>
                    <div class="form-group">
                        <label for="posicion">Posición</label>
                        <select id="posicion" required>
                            <option value="">Seleccione...</option>
                            <option value="Arquero">Arquero</option>
                            <option value="Defensa">Defensa</option>
                            <option value="Mediocampista">Mediocampista</option>
                            <option value="Delantero">Delantero</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <select id="categoria" required>
                            <option value="">Seleccione...</option>
                            <option value="Sub-13">Sub-13</option>
                            <option value="Sub-15">Sub-15</option>
                            <option value="Sub-17">Sub-17</option>
                            <option value="Juvenil">Juvenil</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="btnGuardar" class="btn-submit">Registrar Jugador</button>
            </form>
        </div>

        <div class="tabla-box">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Edad</th>
                        <th>Posición</th>
                        <th>Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaJugadores">
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <div class="social">
            <a href="https://instagram.com/proferisas" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@proferisas" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/profile.php?id=100008320491034" target="_blank"><i class="fab fa-facebook"></i></a>
        </div>
        <p>©️ 2026 Club Risas | Diseñado por <strong>@sebas.dg__</strong></p>
    </footer>

    <script>
        const jugadorForm = document.getElementById('jugadorForm');
        const tablaJugadores = document.getElementById('tablaJugadores');
        const btnGuardar = document.getElementById('btnGuardar');
        const indexJugadorInput = document.getElementById('indexJugador');

        // Cargar jugadores desde LocalStorage al iniciar
        let jugadores = JSON.parse(localStorage.getItem('jugadores')) || [];

        // Función para renderizar la tabla
        function mostrarJugadores() {
            tablaJugadores.innerHTML = '';
            jugadores.forEach((jugador, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${jugador.nombre}</td>
                    <td>${jugador.edad}</td>
                    <td>${jugador.posicion}</td>
                    <td>${jugador.categoria}</td>
                    <td>
                        <button class="btn-accion btn-editar" onclick="editarJugador(${index})"><i class="fas fa-edit"></i></button>
                        <button class="btn-accion btn-borrar" onclick="borrarJugador(${index})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tablaJugadores.appendChild(tr);
            });
        }

        // Evento para añadir o actualizar un jugador
        jugadorForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const edad = document.getElementById('edad').value;
            const posicion = document.getElementById('posicion').value;
            const categoria = document.getElementById('categoria').value;
            const index = indexJugadorInput.value;

            const nuevoJugador = { nombre, edad, posicion, categoria };

            if (index === "") {
                // Agregar nuevo
                jugadores.push(nuevoJugador);
            } else {
                // Editar existente
                jugadores[index] = nuevoJugador;
                indexJugadorInput.value = ""; // Limpiar el input oculto
                btnGuardar.textContent = "Registrar Jugador";
            }

            localStorage.setItem('jugadores', JSON.stringify(jugadores));
            jugadorForm.reset();
            mostrarJugadores();
        });

        // Función para cargar datos al formulario para editar
        window.editarJugador = function(index) {
            const jugador = jugadores[index];
            document.getElementById('nombre').value = jugador.nombre;
            document.getElementById('edad').value = jugador.edad;
            document.getElementById('posicion').value = jugador.posicion;
            document.getElementById('categoria').value = jugador.categoria;
            indexJugadorInput.value = index;
            btnGuardar.textContent = "Actualizar Datos";
        };

        // Función para borrar un jugador
        window.borrarJugador = function(index) {
            if(confirm("¿Seguro que quieres eliminar a este jugador?")) {
                jugadores.splice(index, 1);
                localStorage.setItem('jugadores', JSON.stringify(jugadores));
                mostrarJugadores();
                jugadorForm.reset();
                indexJugadorInput.value = "";
                btnGuardar.textContent = "Registrar Jugador";
            }
        };

        // Inicializar la vista
        mostrarJugadores();
    </script>
</body>
</html>
